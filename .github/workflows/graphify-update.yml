name: Graphify Update

on:
  push:
    branches: [main]

permissions:
  contents: write

# Advisory: failures here surface diagnostics but don't gate merges.
jobs:
  update-graph:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install graphify
        run: pip install graphifyy

      - name: Update code-only graph (zero LLM calls)
        run: graphify . --code-only --update --no-viz

      - name: Compress graph (GitHub blocks files >10MB)
        run: |
          gzip -k9f graphify-out/graph.json
          rm graphify-out/graph.json

      - name: Commit updated graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/graph.json.gz graphify-out/manifest.json
          if git diff --cached --quiet; then
            echo "no graph changes"
          else
            git commit -m "chore: update graphify graph [skip ci]"
            git push
          fi
